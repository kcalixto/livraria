service: livraria
frameworkVersion: '3'

custom:
  # buckets do site estático (criados fora deste stack; typo do prd é real)
  siteBucket:
    dev: livraria-serverless-deployment-dev
    prd: livraria-serverless-deplyment-prd
  table:
    livros:
      dev: livraria-tb-livros-dev
      prd: livraria-tb-livros-prd
    pedidos:
      dev: livraria-tb-pedidos-dev
      prd: livraria-tb-pedidos-prd
    lotes:
      dev: livraria-tb-lotes-dev
      prd: livraria-tb-lotes-prd
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs

provider:
  name: aws
  runtime: nodejs20.x
  region: sa-east-1
  stage: ${opt:stage, 'dev'}
  deploymentBucket:
    name: kcalixto-serverless-framework
  environment:
    STAGE: ${self:provider.stage}
    ASSETS_S3_BUCKET_NAME: livraria-assets-bucket
    LIVROS_TABLE_NAME: ${self:custom.table.livros.${self:provider.stage}}
    PEDIDOS_TABLE_NAME: ${self:custom.table.pedidos.${self:provider.stage}}
    LOTES_TABLE_NAME: ${self:custom.table.lotes.${self:provider.stage}}
    LIVRARIA_FRONT_END_API_KEY: 10a28e2f-07a5-489e-b26a-8abe55d236f8
    BACKOFFICE_ADMIN_API_KEY: ${ssm:/livraria/backoffice-admin-api-key}
    BACKOFFICE_KEY: ${ssm:/livraria/backoffice-key}
    BACKOFFICE_VIEWER_KEY: ${ssm:/livraria/backoffice-viewer-key}
    BACKOFFICE_STOCK_KEY: ${ssm:/livraria/backoffice-stock-key}
    JWT_SECRET: ${ssm:/livraria/jwt-secret}
    # domínio da distribuição do site: entra no allowlist de CORS do Hono
    SITE_CDN_DOMAIN: !GetAtt SiteCdn.DomainName
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:BatchWriteItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt TabelaLivros.Arn
            - !GetAtt TabelaPedidos.Arn
            - !GetAtt TabelaLotes.Arn
            - !Sub '${TabelaPedidos.Arn}/index/*'
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: arn:aws:s3:::livraria-assets-bucket/${self:provider.stage}/comprovantes/*

plugins:
  - serverless-esbuild

functions:
  api:
    handler: src/handler.handler
    events:
      - httpApi: '*'

resources:
  Conditions:
    # backup diário só em produção (dev é descartável)
    IsPrd: !Equals ['${self:provider.stage}', 'prd']
  Resources:
    TabelaLivros:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.table.livros.${self:provider.stage}}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
    TabelaLotes:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.table.lotes.${self:provider.stage}}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
    TabelaPedidos:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.table.pedidos.${self:provider.stage}}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: book_id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
          - AttributeName: book_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: status-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # ── CloudFront na frente do site estático (HTTPS + headers de segurança) ──
    # O site continua no bucket S3 (website hosting); a distribuição só
    # embrulha: TLS, HSTS/nosniff/frame-deny por header, cache dos assets
    # com hash e fallback SPA (404 → index.html). Sem domínio custom: usa
    # o *.cloudfront.net com o certificado default.
    SiteSecurityHeaders:
      Type: AWS::CloudFront::ResponseHeadersPolicy
      Properties:
        ResponseHeadersPolicyConfig:
          Name: livraria-security-headers-${self:provider.stage}
          SecurityHeadersConfig:
            StrictTransportSecurity:
              AccessControlMaxAgeSec: 31536000
              IncludeSubdomains: true
              Override: true
            ContentTypeOptions:
              Override: true
            FrameOptions:
              FrameOption: DENY
              Override: true
            ReferrerPolicy:
              ReferrerPolicy: strict-origin-when-cross-origin
              Override: true
    SiteCdn:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          Comment: livraria site ${self:provider.stage}
          HttpVersion: http2and3
          IPV6Enabled: true
          # inclui as edges da América do Sul (usuários em SP)
          PriceClass: PriceClass_All
          DefaultRootObject: index.html
          Origins:
            - Id: site-s3-website
              DomainName: ${self:custom.siteBucket.${self:provider.stage}}.s3-website-sa-east-1.amazonaws.com
              CustomOriginConfig:
                # endpoint de website do S3 não fala HTTPS; o TLS fica na borda
                OriginProtocolPolicy: http-only
          DefaultCacheBehavior:
            # index.html e capas SEM cache na edge: deploy/capa nova aparece
            # na hora, sem precisar de invalidation no CI
            TargetOriginId: site-s3-website
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed-CachingDisabled
            ResponseHeadersPolicyId: !Ref SiteSecurityHeaders
            Compress: true
          CacheBehaviors:
            # bundles têm hash no nome: cache agressivo é seguro
            - PathPattern: assets/*
              TargetOriginId: site-s3-website
              ViewerProtocolPolicy: redirect-to-https
              CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
              ResponseHeadersPolicyId: !Ref SiteSecurityHeaders
              Compress: true
          CustomErrorResponses:
            # SPA: rota desconhecida cai no index.html (React Router resolve)
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 0

    # ── Backup diário das tabelas de produção (AWS Backup, retenção 7 dias) ──
    BackupVault:
      Type: AWS::Backup::BackupVault
      Condition: IsPrd
      DeletionPolicy: Retain
      Properties:
        BackupVaultName: livraria-backup-vault
    BackupPlan:
      Type: AWS::Backup::BackupPlan
      Condition: IsPrd
      Properties:
        BackupPlan:
          BackupPlanName: livraria-daily-backup
          BackupPlanRule:
            - RuleName: daily-7d
              TargetBackupVault: !Ref BackupVault
              # 07:00 UTC ≈ 04:00 BRT, fora do horário de uso
              ScheduleExpression: cron(0 7 * * ? *)
              Lifecycle:
                DeleteAfterDays: 7
    BackupRole:
      Type: AWS::IAM::Role
      Condition: IsPrd
      Properties:
        RoleName: livraria-backup-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: backup.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
    BackupSelection:
      Type: AWS::Backup::BackupSelection
      Condition: IsPrd
      Properties:
        BackupPlanId: !Ref BackupPlan
        BackupSelection:
          SelectionName: livraria-tables
          IamRoleArn: !GetAtt BackupRole.Arn
          Resources:
            - !GetAtt TabelaLivros.Arn
            - !GetAtt TabelaPedidos.Arn
            - !GetAtt TabelaLotes.Arn

  Outputs:
    SiteCdnDomain:
      Description: Dominio do site atras do CloudFront
      Value: !GetAtt SiteCdn.DomainName
