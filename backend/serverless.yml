service: livraria
frameworkVersion: '3'

custom:
  table:
    livros:
      dev: livraria-tb-livros-dev
      prd: livraria-tb-livros-prd
    pedidos:
      dev: livraria-tb-pedidos-dev
      prd: livraria-tb-pedidos-prd
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs

provider:
  name: aws
  runtime: nodejs20.x
  region: sa-east-1
  stage: ${opt:stage, 'dev'}
  deploymentBucket:
    name: kcalixto-serverless-framework
  environment:
    LIVROS_TABLE_NAME: ${self:custom.table.livros.${self:provider.stage}}
    PEDIDOS_TABLE_NAME: ${self:custom.table.pedidos.${self:provider.stage}}
    LIVRARIA_FRONT_END_API_KEY: ${ssm:/livraria/front-end-api-key}
    BACKOFFICE_KEY: ${ssm:/livraria/backoffice-key}
    JWT_SECRET: ${ssm:/livraria/jwt-secret}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:BatchWriteItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt TabelaLivros.Arn
            - !GetAtt TabelaPedidos.Arn
            - !Sub '${TabelaPedidos.Arn}/index/*'

plugins:
  - serverless-esbuild

functions:
  api:
    handler: src/handler.handler
    events:
      - httpApi: '*'

resources:
  Resources:
    TabelaLivros:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.table.livros.${self:provider.stage}}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
    TabelaPedidos:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.table.pedidos.${self:provider.stage}}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: book_id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
          - AttributeName: book_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: status-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: ALL
