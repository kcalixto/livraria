service: livraria
frameworkVersion: '3'

custom:
  table:
    livros:
      dev: livraria-tb-livros-dev
      prd: livraria-tb-livros-prd
    pedidos:
      dev: livraria-tb-pedidos-dev
      prd: livraria-tb-pedidos-prd
    lotes:
      dev: livraria-tb-lotes-dev
      prd: livraria-tb-lotes-prd
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs

provider:
  name: aws
  runtime: nodejs20.x
  region: sa-east-1
  stage: ${opt:stage, 'dev'}
  deploymentBucket:
    name: kcalixto-serverless-framework
  environment:
    STAGE: ${self:provider.stage}
    ASSETS_S3_BUCKET_NAME: livraria-assets-bucket
    LIVROS_TABLE_NAME: ${self:custom.table.livros.${self:provider.stage}}
    PEDIDOS_TABLE_NAME: ${self:custom.table.pedidos.${self:provider.stage}}
    LOTES_TABLE_NAME: ${self:custom.table.lotes.${self:provider.stage}}
    LIVRARIA_FRONT_END_API_KEY: 10a28e2f-07a5-489e-b26a-8abe55d236f8
    BACKOFFICE_ADMIN_API_KEY: ${ssm:/livraria/backoffice-admin-api-key}
    BACKOFFICE_KEY: ${ssm:/livraria/backoffice-key}
    BACKOFFICE_VIEWER_KEY: ${ssm:/livraria/backoffice-viewer-key}
    BACKOFFICE_STOCK_KEY: ${ssm:/livraria/backoffice-stock-key}
    JWT_SECRET: ${ssm:/livraria/jwt-secret}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:BatchWriteItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt TabelaLivros.Arn
            - !GetAtt TabelaPedidos.Arn
            - !GetAtt TabelaLotes.Arn
            - !Sub '${TabelaPedidos.Arn}/index/*'
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: arn:aws:s3:::livraria-assets-bucket/${self:provider.stage}/comprovantes/*

plugins:
  - serverless-esbuild

functions:
  api:
    handler: src/handler.handler
    events:
      - httpApi: '*'

resources:
  Conditions:
    # backup diário só em produção (dev é descartável)
    IsPrd: !Equals ['${self:provider.stage}', 'prd']
  Resources:
    TabelaLivros:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.table.livros.${self:provider.stage}}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
    TabelaLotes:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.table.lotes.${self:provider.stage}}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
    TabelaPedidos:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: ${self:custom.table.pedidos.${self:provider.stage}}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: book_id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
          - AttributeName: book_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: status-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # ── Backup diário das tabelas de produção (AWS Backup, retenção 7 dias) ──
    BackupVault:
      Type: AWS::Backup::BackupVault
      Condition: IsPrd
      DeletionPolicy: Retain
      Properties:
        BackupVaultName: livraria-backup-vault
    BackupPlan:
      Type: AWS::Backup::BackupPlan
      Condition: IsPrd
      Properties:
        BackupPlan:
          BackupPlanName: livraria-daily-backup
          BackupPlanRule:
            - RuleName: daily-7d
              TargetBackupVault: !Ref BackupVault
              # 07:00 UTC ≈ 04:00 BRT, fora do horário de uso
              ScheduleExpression: cron(0 7 * * ? *)
              Lifecycle:
                DeleteAfterDays: 7
    BackupRole:
      Type: AWS::IAM::Role
      Condition: IsPrd
      Properties:
        RoleName: livraria-backup-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: backup.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
    BackupSelection:
      Type: AWS::Backup::BackupSelection
      Condition: IsPrd
      Properties:
        BackupPlanId: !Ref BackupPlan
        BackupSelection:
          SelectionName: livraria-tables
          IamRoleArn: !GetAtt BackupRole.Arn
          Resources:
            - !GetAtt TabelaLivros.Arn
            - !GetAtt TabelaPedidos.Arn
            - !GetAtt TabelaLotes.Arn
